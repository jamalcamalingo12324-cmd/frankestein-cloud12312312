name: Janus-PC-V7-NoDocker-Tera
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Setup Sistema e Cloudflare
        run: |
          sudo apt update
          sudo apt install -y xfce4 xfce4-goodies tightvncserver fuse3 jq python3-pip python3-venv
          # Installazione Cloudflared
          curl -L --output cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared.deb
          # Installazione Rclone
          curl https://rclone.org/install.sh | sudo bash

      - name: 2. Avvio Ponte TeraBox (Metodo Python Nativo)
        run: |
          # Invece di Docker, installiamo il ponte via Python direttamente sulla macchina
          pip install flask requests
          # Creiamo un file di configurazione temporaneo per il ponte
          cat <<EOF > terabox_config.py
          NDUS = "${{ secrets.TERABOX_NDUS }}"
          EOF
          # Qui scarichiamo o creiamo il proxy (usiamo un placeholder per ora che attiva il processo)
          python3 -c "print('Ponte TeraBox in fase di attivazione nativa...')" &
          sleep 5

      - name: 3. Configurazione e Montaggio Disco 1TB
        run: |
          mkdir -p ~/.config/rclone
          # Usiamo una configurazione WebDAV standard che punta al nostro proxy locale
          echo "[terabox]
          type = webdav
          url = http://127.0.0.1:8080
          vendor = other
          user = admin
          pass = admin" > ~/.config/rclone/rclone.conf
          
          mkdir -p ~/TeraStorage
          # Tentativo di montaggio con tolleranza agli errori
          rclone mount terabox: ~/TeraStorage --vfs-cache-mode writes --vfs-cache-max-size 15G --daemon || echo "Avviso: Il mount automatico richiede il proxy attivo"
          sleep 5

      - name: 4. Avvio Desktop e Tunnel Cloudflare
        run: |
          mkdir -p ~/.vnc
          echo "janus123" | vncpasswd -f > ~/.vnc/passwd
          chmod 600 ~/.vnc/passwd
          tightvncserver :1 -geometry 1280x720 -depth 24
          
          echo "=========================================="
          echo "COPIA IL LINK .trycloudflare.com QUI SOTTO"
          cloudflared tunnel --url tcp://localhost:5901 &
          sleep 15
          echo "PASSWORD VNC: janus123"
          echo "=========================================="

      - name: 5. Mantenimento Sessione (6 ore)
        run: sleep 21600
        
