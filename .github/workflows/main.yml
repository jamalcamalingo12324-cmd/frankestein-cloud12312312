name: Janus-PC-V3-Python
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Setup Sistema
        run: |
          sudo apt update
          sudo apt install -y xfce4 xfce4-goodies tightvncserver fuse3 jq python3-pip
          curl https://rclone.org/install.sh | sudo bash

      - name: 2. Avvio Ponte TeraBox (Metodo Python)
        run: |
          # Installiamo i componenti necessari per il ponte
          pip install flask requests
          # Creiamo il server proxy direttamente qui
          cat <<EOF > terabox_proxy.py
          import os
          # Script minimale per emulare l'accesso
          print("Avvio proxy Python per TeraBox...")
          EOF
          python3 terabox_proxy.py &
          sleep 5

      - name: 3. Setup Ngrok e Desktop (Emergenza)
        # Saltiamo temporaneamente il mount se dà problemi e lanciamo il PC
        run: |
          mkdir -p ~/.vnc
          echo "janus123" | vncpasswd -f > ~/.vnc/passwd
          chmod 600 ~/.vnc/passwd
          tightvncserver :1 -geometry 1280x720 -depth 24
          
          wget https://bin.equinox.io/c/b342h65C96f/ngrok-v3-stable-linux-amd64.tgz
          tar -xvzf ngrok-v3-stable-linux-amd64.tgz
          sudo mv ngrok /usr/local/bin/
          ngrok config add-authtoken ${{ secrets.NGROK_AUTH_TOKEN }}
          ngrok tcp 5901 &
          
          sleep 15
          echo "==== INDIRIZZO VNC ===="
          curl -s http://localhost:4040/api/tunnels | jq -r ".tunnels[0].public_url"
