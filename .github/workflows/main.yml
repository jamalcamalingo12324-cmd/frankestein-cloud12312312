name: Janus-PC-V9-FinalFix
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Setup Sistema
        run: |
          sudo apt update
          sudo apt install -y xfce4 xfce4-goodies tightvncserver fuse3 jq python3-pip
          curl -L --output cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared.deb
          curl https://rclone.org/install.sh | sudo bash

      - name: 2. Avvio Vero Proxy TeraBox
        run: |
          # Tentativo Docker (se non va, resta il PC acceso)
          docker run -d --name bridge -p 8080:8080 -e SET_COOKIES="ndus=${{ secrets.TERABOX_NDUS }}" pmsosary/terabox-webdav || echo "Docker fallito, procedo"
          sleep 20

      - name: 3. Configurazione Rclone (PASSWORD CORRETTA)
        run: |
          mkdir -p ~/.config/rclone
          # Generiamo la password offuscata per "admin" che è "t9_G2z_v4h_L8_p_"
          # Usiamo il comando nativo per non sbagliare
          OBSCURED_PASS=$(rclone obscure admin)
          
          echo "[terabox]
          type = webdav
          url = http://127.0.0.1:8080
          vendor = other
          user = admin
          pass = $OBSCURED_PASS" > ~/.config/rclone/rclone.conf
          
          mkdir -p ~/TeraStorage
          # Montaggio forzato
          rclone mount terabox: ~/TeraStorage --vfs-cache-mode writes --vfs-cache-max-size 15G --daemon
          sleep 10
          # Verifica reale dello spazio
          df -h | grep TeraStorage || echo "Mount non visibile, ma verifichiamo la connessione..."

      - name: 4. Desktop e Tunnel Cloudflare
        run: |
          mkdir -p ~/.vnc
          echo "janus123" | vncpasswd -f > ~/.vnc/passwd
          chmod 600 ~/.vnc/passwd
          tightvncserver :1 -geometry 1280x720 -depth 24
          cloudflared tunnel --url tcp://localhost:5901 &
          sleep 15
          echo "=========================================="
          echo "PASSWORD VNC: janus123"
          echo "=========================================="

      - name: 5. Ciclo Infinito
        run: sleep 21600
        
