name: Janus-PC-V4-Fixed
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Setup Sistema
        run: |
          sudo apt update
          sudo apt install -y xfce4 xfce4-goodies tightvncserver fuse3 jq python3-pip
          curl https://rclone.org/install.sh | sudo bash

      - name: 2. Avvio Desktop e Ngrok (Corretto)
        run: |
          # 1. Configura Password VNC
          mkdir -p ~/.vnc
          echo "janus123" | vncpasswd -f > ~/.vnc/passwd
          chmod 600 ~/.vnc/passwd
          
          # 2. Avvia il Server Grafico
          tightvncserver :1 -geometry 1280x720 -depth 24
          
          # 3. Scarica Ngrok (Link aggiornato 2026)
          curl -s https://ngrok-agent.s3.amazonaws.com/ngrok.asc | sudo tee /etc/apt/trusted.gpg.d/ngrok.asc >/dev/null
          echo "deb https://ngrok-agent.s3.amazonaws.com buster main" | sudo tee /etc/apt/sources.list.d/ngrok.list
          sudo apt update && sudo apt install ngrok
          
          # 4. Attiva Ngrok
          ngrok config add-authtoken ${{ secrets.NGROK_AUTH_TOKEN }}
          ngrok tcp 5901 &
          
          sleep 20
          echo "=========================================="
          echo "INDIRIZZO VNC DA COPIARE:"
          curl -s http://localhost:4040/api/tunnels | jq -r ".tunnels[0].public_url"
          echo "PASSWORD: janus123"
          echo "=========================================="

      - name: 3. Mantieni in vita (Loop Infinito)
        run: |
          echo "PC Online. Non chiudere questa tab di GitHub."
          sleep 21600
